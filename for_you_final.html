<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ЁЯТХ</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:100%;height:100vh;background:linear-gradient(170deg,#ffe0ec,#ffc2d4,#e8b4f8);overflow:hidden;position:relative;}

.title{position:absolute;top:28px;left:0;right:0;text-align:center;font-family:'Dancing Script',cursive;font-size:clamp(30px,8vw,58px);color:#fff;text-shadow:0 2px 18px rgba(180,50,90,0.35);z-index:3;pointer-events:none;}
.hint{position:absolute;top:88px;left:0;right:0;text-align:center;font-family:sans-serif;font-size:13px;letter-spacing:2px;color:rgba(255,255,255,0.75);z-index:3;pointer-events:none;}

/* hearts */
.heart{position:fixed;animation:riseH linear infinite;opacity:0;pointer-events:none;z-index:0;}
@keyframes riseH{0%{transform:translateY(0) translateX(0);opacity:0}8%{opacity:0.75}90%{opacity:0.5}100%{transform:translateY(-110vh) translateX(var(--d));opacity:0}}

/* balloons */
.bln{position:absolute;display:flex;flex-direction:column;align-items:center;cursor:pointer;animation:floatUp linear forwards,sway ease-in-out infinite;z-index:2;}
@keyframes floatUp{from{transform:translateY(0)}to{transform:translateY(-130vh)}}
@keyframes sway{0%,100%{margin-left:0}50%{margin-left:var(--sw)}}
.ball{width:76px;height:96px;border-radius:50% 50% 50% 50%/58% 58% 42% 42%;position:relative;box-shadow:inset -7px -9px 18px rgba(0,0,0,0.13),inset 5px 5px 10px rgba(255,255,255,0.38);}
.ball::before{content:'';position:absolute;top:14%;left:18%;width:18px;height:12px;background:rgba(255,255,255,0.44);border-radius:50%;transform:rotate(-28deg)}
.ball::after{content:'';position:absolute;bottom:-11px;left:50%;transform:translateX(-50%);width:9px;height:9px;background:inherit;border-radius:50%;filter:brightness(0.7)}
.str{width:1.5px;height:58px;background:rgba(160,80,110,0.35)}
.bln.popped .ball{animation:burst .28s ease-in forwards!important;pointer-events:none}
@keyframes burst{0%{transform:scale(1);opacity:1}38%{transform:scale(1.3)}100%{transform:scale(0);opacity:0}}
.bln.popped .str{opacity:0}

/* confetti */
.bits{position:absolute;top:30px;left:50%;transform:translateX(-50%);pointer-events:none;z-index:6}
.bit{position:absolute;width:8px;height:8px;border-radius:50%;animation:bf .8s ease-out forwards}
@keyframes bf{from{transform:translate(0,0);opacity:1}to{transform:translate(var(--bx),var(--by)) scale(0);opacity:0}}

/* center photo overlay */
#overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:10;pointer-events:none;opacity:0;transition:opacity .4s;}
#overlay.show{pointer-events:auto;opacity:1;}
#overlay .backdrop{position:absolute;inset:0;background:rgba(255,180,210,0.38);backdrop-filter:blur(5px);}
#overlay .card{position:relative;display:flex;flex-direction:column;align-items:center;gap:12px;}
#overlay img{width:min(220px,70vw);height:min(275px,85vw);object-fit:cover;border-radius:22px;border:4px solid rgba(255,255,255,0.92);box-shadow:0 20px 60px rgba(180,50,90,0.42);animation:popIn .5s cubic-bezier(.17,.89,.32,1.28) both;}
@keyframes popIn{from{transform:scale(0) rotate(-8deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
#overlay .close{font-family:'Dancing Script',cursive;font-size:16px;color:#fff;background:rgba(220,80,120,0.72);border:none;padding:7px 24px;border-radius:50px;cursor:pointer;letter-spacing:1px;}
#overlay .close:hover{background:rgba(220,80,120,0.92)}

#done{position:fixed;bottom:30px;left:0;right:0;text-align:center;font-family:'Dancing Script',cursive;font-size:clamp(22px,5vw,38px);color:#fff;text-shadow:0 2px 14px rgba(180,50,90,0.4);opacity:0;transition:opacity 1.2s;pointer-events:none;z-index:4;}
</style>
</head>
<body>

<div class="title">ЁЯТХ For You</div>
<div class="hint">tap the balloons тЬи</div>
<div id="hearts"></div>
<div id="stage"></div>

<div id="overlay">
  <div class="backdrop" onclick="closePhoto()"></div>
  <div class="card">
    <img id="overlayImg" src="" alt="surprise"/>
    <button class="close" onclick="closePhoto()">tap to close тЬХ</button>
  </div>
</div>

<div id="done">You are my everything ЁЯТЦ</div>

<script>
const emos=['тЭдя╕П','ЁЯТХ','ЁЯТЦ','ЁЯТЧ','ЁЯТУ','ЁЯМ╕','тЬи','ЁЯТЭ','ЁЯМ║','ЁЯТЮ'];
const hc=document.getElementById('hearts');
for(let i=0;i<28;i++){
  const h=document.createElement('span');
  h.className='heart';
  h.textContent=emos[i%emos.length];
  const dur=6+Math.random()*8;
  h.style.cssText=`left:${Math.random()*100}%;bottom:-30px;font-size:${11+Math.random()*15}px;animation-duration:${dur}s;animation-delay:-${Math.random()*dur}s;--d:${(Math.random()*90-45)}px`;
  hc.appendChild(h);
}

const cfg=[
  {color:'#ff6f91',delay:0,left:16,sway:28, dur:8,img:'https://i.postimg.cc/cJGg3njk/681896818-954428440891205-5204983292214999248-n.jpg'},
  {color:'#f472b6',delay:3,left:45,sway:-30,dur:9,img:'https://i.postimg.cc/YSBGFWVs/683456482-818154424275374-6915865321335367501-n.jpg'},
  {color:'#c084fc',delay:6,left:74,sway:26, dur:8,img:'https://i.postimg.cc/d0ckCyXf/683800863-1902858787046812-8262001238418017657-n.jpg'},
];

let poppedCount=0;
const stage=document.getElementById('stage');
const confCols=['#ff6f91','#fbbf24','#f472b6','#c084fc','#f87171','#60a5fa','#fff'];

cfg.forEach((c,i)=>{
  const wrap=document.createElement('div');
  wrap.className='bln';
  wrap.id='bln'+i;
  wrap.style.cssText=`left:${c.left}%;bottom:-170px;--sw:${c.sway}px;animation:floatUp ${c.dur}s ${c.delay}s linear forwards,sway 3s ${c.delay}s ease-in-out infinite`;
  wrap.innerHTML=`<div class="bits" id="bits${i}"></div><div class="ball" style="background:${c.color}"></div><div class="str"></div>`;
  wrap.addEventListener('click',()=>popIt(i,c.img));
  stage.appendChild(wrap);
});

function popIt(i,imgSrc){
  const wrap=document.getElementById('bln'+i);
  if(wrap.classList.contains('popped'))return;
  const r=wrap.getBoundingClientRect();
  const pr=stage.getBoundingClientRect();
  wrap.style.cssText=`left:${r.left-pr.left}px;top:${r.top-pr.top}px;bottom:auto;animation:none;margin-left:0;position:absolute;display:flex;flex-direction:column;align-items:center;z-index:2;`;
  wrap.classList.add('popped');
  const bits=document.getElementById('bits'+i);
  for(let p=0;p<16;p++){
    const b=document.createElement('div');b.className='bit';
    const ang=(p/16)*360,r2=44+Math.random()*38;
    b.style.cssText=`background:${confCols[p%confCols.length]};--bx:${Math.cos(ang*Math.PI/180)*r2}px;--by:${Math.sin(ang*Math.PI/180)*r2}px;animation-delay:${Math.random()*0.07}s`;
    bits.appendChild(b);
  }
  setTimeout(()=>bits.innerHTML='',950);
  setTimeout(()=>{
    const ov=document.getElementById('overlay');
    const img=document.getElementById('overlayImg');
    img.src=imgSrc;
    img.style.animation='none';
    void img.offsetWidth;
    img.style.animation='';
    ov.classList.add('show');
  },300);
  poppedCount++;
  if(poppedCount===3) setTimeout(()=>document.getElementById('done').style.opacity='1',1400);
}

function closePhoto(){
  document.getElementById('overlay').classList.remove('show');
}
</script>
</body>
</html>
